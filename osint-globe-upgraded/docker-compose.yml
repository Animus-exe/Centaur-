version: "3.9"

services:
  db:
    image: timescale/timescaledb-postgis:pg16
    container_name: osint_db
    environment:
      POSTGRES_USER: osint
      POSTGRES_PASSWORD: osint
      POSTGRES_DB: osint
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./backend/app/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osint -d osint"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    container_name: osint_backend
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: osint_frontend
    environment:
      - VITE_API_BASE=http://localhost:8000
      - VITE_CESIUM_ION_TOKEN=${VITE_CESIUM_ION_TOKEN}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  dbdata:
